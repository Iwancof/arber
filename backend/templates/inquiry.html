<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inquiry Console - Event Intelligence OS</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --blue: #58a6ff; --green: #3fb950; --red: #f85149; --orange: #d29922; --purple: #bc8cff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 20px; margin-bottom: 16px; color: var(--blue); }
  h2 { font-size: 16px; margin: 16px 0 8px; color: var(--muted); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 8px 16px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 12px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 600; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge-critical { background: var(--red); color: #fff; }
  .badge-high { background: var(--orange); color: #000; }
  .badge-normal { background: var(--blue); color: #fff; }
  .badge-low { background: var(--muted); color: #fff; }
  .badge-overdue { background: var(--red); color: #fff; }
  .badge-due-soon { background: var(--orange); color: #000; }
  .badge-ok { background: var(--green); color: #000; }
  .badge-status { background: var(--purple); color: #fff; }

  /* Form */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  input, textarea, select { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 14px; }
  textarea { min-height: 120px; font-family: monospace; resize: vertical; }
  select { cursor: pointer; }

  /* Buttons */
  .btn { padding: 8px 16px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-success { background: var(--green); color: #000; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-group { display: flex; gap: 8px; margin-top: 12px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 500; }

  /* Toast */
  .toast { position: fixed; top: 16px; right: 16px; padding: 12px 20px; border-radius: 6px; font-size: 14px; z-index: 1000; display: none; }
  .toast-success { background: var(--green); color: #000; }
  .toast-error { background: var(--red); color: #fff; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--muted); }

  .question-text { background: var(--bg); padding: 12px; border-radius: 4px; margin: 8px 0; font-size: 14px; white-space: pre-wrap; }
  .meta { font-size: 12px; color: var(--muted); }
  .deadline { font-weight: 600; }
  .refresh-btn { position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 20px; border: none; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<div class="container">
  <h1>📋 Inquiry Console</h1>

  <div class="stats" id="stats"></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('pending')">回答待ち</div>
    <div class="tab" onclick="switchTab('history')">回答履歴</div>
  </div>

  <div id="pending" class="tab-content active">
    <div id="task-list"></div>
  </div>

  <div id="history" class="tab-content">
    <div id="response-list"></div>
  </div>
</div>

<!-- Answer Modal -->
<div id="answer-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100;">
  <div style="max-width:700px; margin:40px auto; max-height:90vh; overflow-y:auto;" class="card">
    <div class="card-header">
      <span class="card-title" id="modal-title">回答フォーム</span>
      <button class="btn btn-secondary" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-question" class="question-text"></div>
    <form id="answer-form" onsubmit="submitAnswer(event)">
      <input type="hidden" id="answer-task-id">
      <div class="form-group">
        <label>回答チャネル</label>
        <select id="answer-channel">
          <option value="direct_answer">直接回答</option>
          <option value="external_llm">外部LLM経由</option>
        </select>
      </div>
      <div class="form-group">
        <label>回答 (JSON)</label>
        <textarea id="answer-response" placeholder='{"verdict": "outperform", "horizons": {"5d": {"confidence": 0.72}}, "key_risks": ["..."]}'></textarea>
      </div>
      <div class="form-group">
        <label>メモ (任意)</label>
        <input type="text" id="answer-notes" placeholder="補足事項">
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">送信</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="refresh-btn" onclick="loadAll()" title="更新">↻</button>

<script>
const API = '/v1';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(name).classList.add('active');
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function urgencyBadge(u) {
  return `<span class="badge badge-${u}">${u}</span>`;
}

function timeBadge(deadline) {
  const d = new Date(deadline);
  const now = new Date();
  const diff = (d - now) / 60000;
  if (diff < 0) return '<span class="badge badge-overdue">OVERDUE</span>';
  if (diff < 30) return '<span class="badge badge-due-soon">DUE SOON</span>';
  return '<span class="badge badge-ok">OK</span>';
}

async function loadStats() {
  try {
    const r = await fetch(API + '/inquiry/metrics');
    const d = await r.json();
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="stat-value">${d.open_count || 0}</div><div class="stat-label">Open Cases</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--orange)">${d.due_soon_count || 0}</div><div class="stat-label">Due Soon</div></div>
      <div class="stat"><div class="stat-value" style="color:var(--red)">${d.overdue_count || 0}</div><div class="stat-label">Overdue</div></div>
    `;
  } catch(e) { console.error(e); }
}

async function loadTasks() {
  try {
    const r = await fetch(API + '/inquiry/tasks?limit=50');
    const d = await r.json();
    const tasks = d.items || [];
    if (!tasks.length) {
      document.getElementById('task-list').innerHTML = '<div class="card"><p style="color:var(--muted)">回答待ちのタスクはありません</p></div>';
      return;
    }
    document.getElementById('task-list').innerHTML = tasks.map(t => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${t.question_title || 'Untitled'}</span>
          <span>${timeBadge(t.deadline_at)} <span class="badge badge-status">${t.task_status}</span></span>
        </div>
        <div class="question-text">${t.question_text || ''}</div>
        <div class="meta">
          SLA: ${t.sla_class || '-'} | Priority: ${t.priority_score || 0} | Deadline: <span class="deadline">${new Date(t.deadline_at).toLocaleString('ja-JP')}</span>
        </div>
        <div class="btn-group">
          ${t.task_status === 'visible' ? `<button class="btn btn-secondary" onclick="claimTask('${t.inquiry_task_id}')">Claim</button>` : ''}
          ${['visible','claimed','awaiting_response'].includes(t.task_status) ? `<button class="btn btn-primary" onclick="openAnswer('${t.inquiry_task_id}', '${(t.question_title||'').replace(/'/g,"\\'")}', '${(t.question_text||'').replace(/'/g,"\\'")}')">回答する</button>` : ''}
          ${t.task_status === 'submitted' ? `<button class="btn btn-success" onclick="acceptLatest('${t.inquiry_task_id}')">Accept</button><button class="btn btn-danger" onclick="rejectTask('${t.inquiry_task_id}')">Reject</button>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

async function loadResponses() {
  // Use decisions as proxy for history since we don't have a direct responses list endpoint
  try {
    const r = await fetch(API + '/inquiry/cases?limit=20');
    const d = await r.json();
    const cases = d.items || [];
    document.getElementById('response-list').innerHTML = cases.length ? cases.map(c => `
      <div class="card">
        <div class="card-header">
          <span class="card-title">${c.title}</span>
          <span class="badge badge-status">${c.case_status}</span>
        </div>
        <div class="meta">${c.inquiry_kind} | ${c.primary_symbol || '-'} | ${urgencyBadge(c.urgency_class)} | ${new Date(c.opened_at).toLocaleString('ja-JP')}</div>
      </div>
    `).join('') : '<div class="card"><p style="color:var(--muted)">履歴なし</p></div>';
  } catch(e) { console.error(e); }
}

async function claimTask(taskId) {
  try {
    const r = await fetch(API + `/inquiry/tasks/${taskId}/claim`, {method:'POST'});
    if (r.ok) { toast('Claimed'); loadAll(); }
    else { const e = await r.json(); toast(e.detail || 'Error', 'error'); }
  } catch(e) { toast('Error', 'error'); }
}

function openAnswer(taskId, title, text) {
  document.getElementById('answer-task-id').value = taskId;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-question').textContent = text;
  document.getElementById('answer-response').value = '';
  document.getElementById('answer-notes').value = '';
  document.getElementById('answer-modal').style.display = 'block';
}

function closeModal() {
  document.getElementById('answer-modal').style.display = 'none';
}

async function submitAnswer(e) {
  e.preventDefault();
  const taskId = document.getElementById('answer-task-id').value;
  const body = {
    response_channel: document.getElementById('answer-channel').value,
    raw_response: document.getElementById('answer-response').value,
  };
  const notes = document.getElementById('answer-notes').value;
  if (notes) body.notes = notes;

  try {
    const r = await fetch(API + `/inquiry/tasks/${taskId}/submit-response`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (r.ok) { toast('回答を送信しました'); closeModal(); loadAll(); }
    else { const e = await r.json(); toast(e.detail || 'Error', 'error'); }
  } catch(e) { toast('送信エラー', 'error'); }
}

async function acceptLatest(taskId) {
  // Get latest response for this task
  try {
    const r = await fetch(API + `/prompt-tasks`); // Fallback - accept directly
    const resp = await fetch(API + `/inquiry/tasks/${taskId}/accept`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({response_id: '', effective_weight: 1.0})
    });
    if (resp.ok) { toast('Accepted'); loadAll(); }
    else { const e = await resp.json(); toast(e.detail || 'Error', 'error'); }
  } catch(e) { toast('Error', 'error'); }
}

async function rejectTask(taskId) {
  try {
    const r = await fetch(API + `/inquiry/tasks/${taskId}/reject`, {method:'POST'});
    if (r.ok) { toast('Rejected'); loadAll(); }
    else { const e = await r.json(); toast(e.detail || 'Error', 'error'); }
  } catch(e) { toast('Error', 'error'); }
}

function loadAll() { loadStats(); loadTasks(); loadResponses(); }

// Auto-refresh every 30s
loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
